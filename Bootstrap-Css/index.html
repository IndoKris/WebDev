<!DOCTYPE html>
<html>
<head>
    <title>Simple Bootstrap Page</title>

    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

    
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">My Website</a>
        </div>
    </nav>

    <!-- Cards Section -->
    <div class="container mt-4">
        <div class="row">

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Web Design</h4>
                    <p>Bootstrap makes websites responsive.</p>
                    <button class="btn btn-primary">Read More</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Bootstrap Grid</h4>
                    <p>Grid system adjusts layout automatically.</p>
                    <button class="btn btn-success">Explore</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-3">
                    <h4>Responsive Layout</h4>
                    <p>Works on mobile and desktop devices.</p>
                    <button class="btn btn-danger">Learn More</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
